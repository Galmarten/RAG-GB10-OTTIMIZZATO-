
<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UNIVPM • Login</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header img {
      height: 60px;
      margin-bottom: 20px;
    }

    .login-header h1 {
      margin: 0;
      font-size: 24px;
      color: #333;
      font-weight: 600;
    }

    .login-header p {
      margin: 8px 0 0 0;
      color: #666;
      font-size: 14px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group select {
      background-color: white;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 20px;
      padding-right: 36px;
    }

    .login-button {
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      padding: 12px;
      background-color: #fee;
      color: #c33;
      border: 1px solid #fcc;
      border-radius: 4px;
      font-size: 14px;
      display: none;
      margin-bottom: 16px;
    }

    .error-message.show {
      display: block;
    }

    .info-message {
      padding: 12px;
      background-color: #e8f4f8;
      color: #0c5460;
      border: 1px solid #bee5eb;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #667eea;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="/static/img/univpm-logo.svg" alt="UNIVPM" />
      <h1>UNIVPM</h1>
      <p>Accedi al Chatbot</p>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <div class="info-message">
      <strong>Modalità Demo:</strong> Inserisci qualsiasi nome utente e password per accedere.
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">Nome Utente</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Inserisci il tuo nome utente"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Inserisci la tua password"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="form-group">
        <label for="office">Ufficio</label>
        <select id="office" name="office" required>
          <option value="">Caricamento uffici...</option>
        </select>
      </div>

      <button type="submit" class="login-button" id="loginButton">
        Accedi
      </button>

      <div class="loading" id="loading">
        <span class="spinner"></span>
        Autenticazione in corso...
      </div>
    </form>

    <div class="footer-text">
      <p>UNIVPM • Prototipo offline • Nessun dato lascia il server</p>
    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
